#
# project.yml — xcodegen spec for MacAMDGPU.
#
# Builds two targets:
#   • MacAMDGPUHost  (macOS app)    — SwiftUI host that activates the dext
#   • MacAMDGPU      (DriverKit dext) — the actual driver
#
# Usage:
#   scripts/build.sh           # generate + build
#   scripts/build.sh --gen     # generate the .xcodeproj only
#   scripts/build.sh --open    # generate + open in Xcode
#
# Before building, set XCODE_TEAM_ID in your environment to your
# Apple Developer team ID (10-char prefix). e.g.
#   export XCODE_TEAM_ID=ABCDE12345
#
# To change the bundle ID prefix, edit BUNDLE_PREFIX below and the
# matching dextBundleIdentifier constant in
# Host/MacAMDGPUHostApp.swift.
#

name: MacAMDGPU

options:
  bundleIdPrefix: com.geramyloveless
  deploymentTarget:
    macOS: "26.2"
  groupSortPosition: top
  generateEmptyDirectories: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.10"
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
    CLANG_CXX_LIBRARY: "libc++"
    # Apple Developer team — defaults to Geramy's team, override via env:
    #   XCODE_TEAM_ID=ABCDE12345 scripts/build.sh
    DEVELOPMENT_TEAM: ${XCODE_TEAM_ID:-YBQ9BU6Q6F}
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEAD_CODE_STRIPPING: YES
    GCC_OPTIMIZATION_LEVEL: 0   # debug build by default; override with `xcodebuild -configuration Release`
    SWIFT_OPTIMIZATION_LEVEL: -Onone

#====================================================================
# Targets
#====================================================================
targets:

  #--------------------------------------------------------------
  # MacAMDGPU — the DriverKit extension itself.
  #
  # xcodegen recognizes `driver-extension` and sets the right
  # product type (com.apple.product-type.driver-extension) plus
  # SDKROOT=driverkit. Sources include both the top-level PCI dext
  # plumbing and the dext/amdgpu/ ported bringup code.
  #--------------------------------------------------------------
  MacAMDGPU:
    type: driver-extension
    platform: macOS
    sources:
      - path: dext
        includes:
          - "*.cpp"
          - "*.iig"
          - "*.h"
          - "amdgpu/**/*.cpp"
          - "amdgpu/**/*.h"
        excludes:
          - "README.md"
    dependencies:
      - sdk: PCIDriverKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.geramyloveless.MacAMDGPUHost.MacAMDGPU
        # MUST equal PRODUCT_BUNDLE_IDENTIFIER on macOS Tahoe (26.x).
        # sysextd matches the embedded .dext by directory name, which
        # is derived from PRODUCT_NAME. If the dext is named anything
        # other than its bundle ID, activation fails with code 4
        # "Extension not found in App bundle" before sysextd even
        # reaches the validation stage. qemu-vfio-apple's working
        # dext is shipped as
        # com.geramyloveless.vfiohostapp.VFIOUserPCIDriver.dext;
        # we mirror that.
        PRODUCT_NAME: com.geramyloveless.MacAMDGPUHost.MacAMDGPU
        SDKROOT: driverkit
        # Match the DK SDK shipped with macOS 26 (Tahoe). 23.0 worked
        # on older macOS but Tahoe's sysextd appears to reject dexts
        # declaring OSMinimumDriverKitVersion < ~25.0 with a vague
        # "Extension not found in App bundle" error.
        DRIVERKIT_DEPLOYMENT_TARGET: "25.2"
        # arm64-only on Apple Silicon. Universal builds were causing
        # the staging layer to reject the dext on macOS Tahoe.
        ARCHS: "arm64"
        EXCLUDED_ARCHS[sdk=driverkit*]: "x86_64"
        ONLY_ACTIVE_ARCH: "NO"
        SUPPORTED_PLATFORMS: driverkit
        INFOPLIST_FILE: dext/Info.plist
        CODE_SIGN_ENTITLEMENTS: dext/MacAMDGPU.entitlements
        # `-o library,runtime` (= flags=0x12000) is required for AMFI
        # to honor restricted DriverKit entitlements like
        # `com.apple.developer.driverkit.allow-any-userclient-access`.
        # Without library-validation, AMFI silently strips the claim
        # at load time; ioreg then shows
        #   "IOUserClientEntitlements" = No
        # on the IOUserServer, and any external IOServiceOpen against
        # the dext returns kIOReturnNotPermitted (0xe00002e2) — even
        # for the host app from the same team. qemu-vfio-apple's
        # working dext ships with flags=0x12000; we mirror it.
        OTHER_CODE_SIGN_FLAGS: "-o library,runtime"
        DEAD_CODE_STRIPPING: NO    # IIG-generated symbols need to stay
        DEFINES_MODULE: NO
        HEADER_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/dext
          - $(SRCROOT)/dext/amdgpu
        OTHER_LDFLAGS: "$(inherited) -framework DriverKit -framework PCIDriverKit"

  #--------------------------------------------------------------
  # MacAMDGPUHost — the SwiftUI parent app.
  #
  # Embeds the dext as a SystemExtension. The dext's bundle ID
  # MUST be a child of this app's bundle ID per Apple's rules.
  #--------------------------------------------------------------
  MacAMDGPUHost:
    type: application
    platform: macOS
    sources:
      - path: Host
        includes:
          - "*.swift"
      # Bundle the AMD microcode blobs into Contents/Resources/firmware
      # so end-users don't have to clone linux-firmware separately.
      - path: firmware
        buildPhase: resources
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.geramyloveless.MacAMDGPUHost
        PRODUCT_NAME: MacAMDGPUHost
        INFOPLIST_FILE: Host/Info.plist
        CODE_SIGN_ENTITLEMENTS: Host/Host.entitlements
        # qemu-vfio-apple's working host ships with hardened runtime OFF
        # (`flags=0x0(none)`). With it ON, IOServiceOpen against the
        # dext's user client returns kIOReturnNotPermitted (0xe00002e2)
        # because Apple's IOKit gates user-client access by host-side
        # entitlement, and our Development-signed host doesn't carry
        # com.apple.developer.driverkit.userclient-access — that
        # requires an Apple portal grant we don't have. The dext side
        # already advertises allow-any-userclient-access, so disabling
        # hardened runtime on the host lifts the gate.
        ENABLE_HARDENED_RUNTIME: NO
        MACOSX_DEPLOYMENT_TARGET: "26.2"
        SYSTEM_EXTENSION_TARGETS: MacAMDGPU
    dependencies:
      # xcodegen handles the destination based on the embedded target's
      # type (driver-extension → Contents/Library/SystemExtensions).
      # codeSign: false matches what qemu-vfio-apple's working
      # project does — keeping CodeSignOnCopy off so the dext's
      # original signature (with the transport.pci entitlement) is
      # preserved during embed instead of being re-signed without it.
      - target: MacAMDGPU
        embed: true
        codeSign: false
